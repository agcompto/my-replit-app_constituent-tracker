kind = "web"
previewPath = "/"
title = "Constituent Touchpoint Planner"
version = "1.0.0"
id = "artifacts/touchpoint-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19982

[services.development]
run = "pnpm --filter @workspace/touchpoint-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/touchpoint-planner", "run", "build" ]
publicDir = "artifacts/touchpoint-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19982"
BASE_PATH = "/"
