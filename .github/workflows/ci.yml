name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - deployment-hardening

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Dependency hygiene check
        run: node scripts/check-native-deps.mjs
      # Temporary MVP-branch allowance: the Replit-exported workspace lockfile
      # is stale relative to package.json catalog/workspace references. CI still
      # validates typecheck/build/audit, but the lockfile should be regenerated
      # and this should return to --frozen-lockfile before production merge.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build:deploy
      - run: pnpm audit --audit-level high

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t constituent-tracker:ci .
