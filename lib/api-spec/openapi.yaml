  # ───────── Audit / Settings / Retention
  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Search the audit log with cursor-based pagination. Admin/super_admin only.
      parameters:
        - { name: actorId, in: query, schema: { type: integer } }
        - name: action
          in: query
          description: One or more action names. Repeat the parameter for multiple values.
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - { name: campaignId, in: query, schema: { type: integer } }
        - { name: targetUserId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - name: q
          in: query
          schema: { type: string }
          description: Free-text search over action, entity type, actor name, and details.
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque pagination cursor returned as `nextCursor` from a prior call.
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogPage" }
  /audit-log/export.csv:
    get:
      operationId: exportAuditLogCsv
      tags: [audit]
      summary: Download the current audit-log filter set as CSV. Admin/super_admin only. Capped at 50,000 rows.
      parameters:
        - { name: actorId, in: query, schema: { type: integer } }
        - name: action
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - { name: campaignId, in: query, schema: { type: integer } }
        - { name: targetUserId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200":
          description: CSV file (one header row + one row per audit entry).
          content:
            text/csv:
              schema: { type: string }
        "413":
          description: Filter matches more rows than the export cap allows.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditExportTooLarge" }
