        uploadedAt: { type: string, format: date-time }
        source: { type: string }
        validCount: { type: integer }
        rejectedCount: { type: integer }

    ExportJob:
      type: object
      required: [id, campaignId, campaignName, exportedByName, exportedAt, fileName, rowCount]
      properties:
        id: { type: integer }
        campaignId: { type: integer }
        campaignName: { type: string }
        exportedByName: { type: string }
        exportedAt: { type: string, format: date-time }
        touchId: { type: ["integer", "null"] }
        fileName: { type: string }
        rowCount: { type: integer }
        seedCount: { type: integer }
        suppressedCount: { type: integer }

    AuditEntry:
      type: object
      required: [id, actorName, action, entityType, createdAt]
      properties:
        id: { type: integer }
        actorName: { type: string }
