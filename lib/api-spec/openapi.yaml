        campaignTypeId: { type: integer }
        touchId: { type: integer }
        reasonCodeId: { type: integer }
        reason: { type: string }
        notes: { type: string }
        rawText: { type: string }
        googleSheetUrl: { type: string }

    SuppressionReasonCode:
