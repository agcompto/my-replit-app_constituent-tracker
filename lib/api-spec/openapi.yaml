  /reports/cohort-analysis:
    get:
      operationId: getCohortAnalysis
      tags: [reports]
      parameters:
        - { name: months, in: query, schema: { type: integer, minimum: 1, maximum: 36 } }
        - { name: owningUnit, in: query, schema: { type: string } }
        - { name: channelId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CohortAnalysis" }
  /reports/saturation:
    get:
      operationId: getSaturationReport
      tags: [reports]
      summary: |
        Channel × week saturation heatmap. Returns one row per active channel
        with a cell per ISO week (Monday-anchored) over the requested horizon,
        showing planned touchpoint count and contributing campaigns. Intensity
        is rendered client-side as count / capacity (per-channel weekly cap
        configured in app settings).
      parameters:
        - { name: weeks, in: query, schema: { type: integer, minimum: 1, maximum: 26 } }
        - { name: start, in: query, schema: { type: string, format: date }, description: "Anchor date; the report begins at the Monday of this date's ISO week. Defaults to today." }
        - { name: owningUnit, in: query, schema: { type: string } }
        - { name: channelId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SaturationReport" }
  /reports/calendar:
    get:
      operationId: getCalendarFeed
      tags: [reports]
      summary: |
        Planned-touch calendar feed for a date range. Returns one row per touch,
        suitable for rendering a month or week grid. Open to every authenticated
        user; no admin gate. Date window is capped at 92 days server-side.
        Excludes voided campaigns and seed rows.
      parameters:
        - { name: startDate, in: query, required: true, schema: { type: string, format: date } }
        - { name: endDate, in: query, required: true, schema: { type: string, format: date } }
        - { name: owningUnit, in: query, schema: { type: string } }
        - name: channelId
          in: query
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - name: campaignTypeId
          in: query
          schema: { type: array, items: { type: integer } }
          style: form
          explode: true
        - name: status
          in: query
          schema: { type: array, items: { type: string } }
          style: form
          explode: true
        - { name: mine, in: query, schema: { type: boolean } }
        - { name: nameContains, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarFeed" }
        "400": { description: "Invalid date range or window exceeds 92 days." }

  /reports/yoy-volume:
