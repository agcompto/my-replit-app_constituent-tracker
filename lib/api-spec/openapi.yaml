openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Constituent Touchpoint Planner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: campaignTypes
  - name: channels
  - name: owningUnits
  - name: campaigns
  - name: audience
  - name: touches
  - name: thresholds
  - name: suppressions
  - name: seeds
  - name: exports
  - name: donors
  - name: reports
  - name: audit
  - name: settings
  - name: retention
  - name: suppressionReasons
  - name: healthCheck
  - name: thresholdTemplates
  - name: aiAssist
  - name: savedViews

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ───────── Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200":
          description: |
            OK. Returns a `SessionUser` when login completes in one step
            (standard users, or admins who have already enrolled and supplied
            a TOTP code via `/auth/login/totp`). Returns a `LoginTotpChallenge`
            when the user's role mandates TOTP and a second step is required.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginOutcome" }
  /auth/login/totp:
    post:
      operationId: loginTotp
      tags: [auth]
      summary: Complete a pending TOTP-required login by submitting a 6-digit code or a recovery code.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TotpVerifyInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "401": { description: Invalid code or no pending TOTP login. }
        "429": { description: Account temporarily locked from too many failed attempts. }
  /auth/totp/status:
    get:
      operationId: getTotpStatus
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TotpStatus" }
  /auth/totp/enroll/start:
    post:
      operationId: startTotpEnrollment
      tags: [auth]
      summary: |
        Generate a candidate TOTP secret and QR code. Callable both during a
        pending-TOTP login (to onboard a brand-new admin) and from settings
        (to (re-)enroll). The secret is held in the session and not persisted
        until `enrollTotpVerify` succeeds.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TotpEnrollStartResponse" }
  /auth/totp/enroll/verify:
    post:
      operationId: verifyTotpEnrollment
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TotpEnrollVerifyInput" }
      responses:
        "200":
          description: |
            Enrollment confirmed. Returns the ten single-use recovery codes —
            shown to the user exactly once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TotpRecoveryCodes" }
  /auth/totp/recovery-codes/regenerate:
    post:
      operationId: regenerateTotpRecoveryCodes
      tags: [auth]
      summary: Re-issue the user's ten recovery codes (re-auth required).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TotpRecoveryCodes" }
  /auth/totp/disable:
    post:
      operationId: disableTotp
      tags: [auth]
      summary: |
        Disable own TOTP. Forbidden when the caller's role mandates TOTP
        (admin/super_admin) — they must first downgrade or have an admin reset.
      responses:
        "204": { description: Disabled. }
        "403": { description: "Role requires TOTP, or re-auth required." }
  /users/{id}/totp/reset:
    post:
      operationId: resetUserTotp
      tags: [users]
      summary: |
        Super-admin-only. Clear another user's TOTP enrollment so they re-enroll
        on next login. Re-auth required.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Reset. }
        "403": { description: "Forbidden, or re-auth required." }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204": { description: Logged out }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
  /auth/acknowledge-pii:
    post:
      operationId: acknowledgePii
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
  /auth/reauth:
    post:
      operationId: reauth
      tags: [auth]
      summary: Re-verify the current user's password to satisfy `requireRecentAuth`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReauthInput" }
      responses:
        "204": { description: Re-auth recorded; the gated request can be retried. }
        "401": { description: Incorrect password. }
        "429": { description: Account temporarily locked from too many failed attempts. }
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Self-service password reset request. Always returns 200 with the same body to prevent account-existence enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordInput" }
      responses:
        "200":
          description: Generic acknowledgement (does not indicate whether the email matched a real account).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForgotPasswordAck" }
  /auth/change-password:
    post:
      operationId: changeOwnPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }

  # ───────── Users (admin)
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserCreatedResponse" }
  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetResponse" }
  /users/{id}/resend-invite:
    post:
      operationId: resendInvite
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteResponse" }
  /password-setup/{token}:
    get:
      operationId: validatePasswordSetupToken
      tags: [auth]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordSetupTokenInfo" }
        "404": { description: Invalid or expired }
  /password-setup/{token}/complete:
    post:
      operationId: completePasswordSetup
      tags: [auth]
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompletePasswordSetupInput" }
      responses:
        "204": { description: Password set; user can now sign in }
        "400": { description: Password did not satisfy policy }
        "404": { description: Invalid or expired }

  # ───────── Campaign types
  /campaign-types:
    get:
      operationId: listCampaignTypes
      tags: [campaignTypes]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CampaignType" }
    post:
      operationId: createCampaignType
      tags: [campaignTypes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignTypeInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CampaignType" }
  /campaign-types/{id}:
    patch:
      operationId: updateCampaignType
      tags: [campaignTypes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignTypeUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CampaignType" }

  # ───────── Channels
  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Channel" }
    post:
      operationId: createChannel
      tags: [channels]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChannelInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Channel" }
  /channels/{id}:
    patch:
      operationId: updateChannel
      tags: [channels]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChannelUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Channel" }

  # ───────── Owning units
  /owning-units:
    get:
      operationId: listOwningUnits
      tags: [owningUnits]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OwningUnit" }
    post:
      operationId: createOwningUnit
      tags: [owningUnits]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OwningUnitInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwningUnit" }
  /owning-units/{id}:
    patch:
      operationId: updateOwningUnit
      tags: [owningUnits]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OwningUnitUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwningUnit" }

  # ───────── Campaigns
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      parameters:
        - { name: mine, in: query, schema: { type: boolean } }
        - { name: status, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CampaignSummary" }
    post:
      operationId: createCampaign
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /campaigns/{id}/clone:
    post:
      operationId: cloneCampaign
      tags: [campaigns]
      summary: |
        Clone a campaign's structural setup (touches, thresholds, scope-only
        suppressions, seeds) into a new draft campaign owned by the caller.
        The audience is intentionally NOT copied — staff upload a fresh list
        each cycle.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloneCampaignInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CloneCampaignResponse" }
  /campaigns/{id}/archive:
    post:
      operationId: archiveCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
  /campaigns/{id}/void:
    post:
      operationId: voidCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }

  # ───────── Audience
  /campaigns/{id}/audience:
    post:
      operationId: uploadAudience
      tags: [audience]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AudienceInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudienceUploadResult" }
    get:
      operationId: getAudienceSummary
      tags: [audience]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudienceUploadResult" }

  # ───────── Touches
  /campaigns/{id}/touches:
    get:
      operationId: listTouches
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Touch" }
    post:
      operationId: createTouch
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TouchInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Touch" }
  /campaigns/{id}/touches/{touchId}/audience:
    post:
      operationId: uploadTouchAudience
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: touchId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AudienceInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AudienceUploadResult" }
    delete:
      operationId: clearTouchAudience
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: touchId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Cleared }
  /campaigns/{id}/touches/{touchId}:
    patch:
      operationId: updateTouch
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: touchId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TouchUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Touch" }
    delete:
      operationId: deleteTouch
      tags: [touches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: touchId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ───────── Thresholds
  /campaigns/{id}/thresholds:
    get:
      operationId: listThresholds
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ThresholdCheck" }
    post:
      operationId: createThreshold
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThresholdInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThresholdCheck" }
  /campaigns/{id}/thresholds/{thresholdId}:
    patch:
      operationId: updateThreshold
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: thresholdId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThresholdInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThresholdCheck" }
    delete:
      operationId: deleteThreshold
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: thresholdId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /campaigns/{id}/threshold-preview:
    post:
      operationId: previewThresholds
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThresholdPreview" }
  /campaigns/{id}/threshold-overrides:
    post:
      operationId: setThresholdOverrides
      tags: [thresholds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OverrideInput" }
      responses:
        "204": { description: Saved }

  # ───────── Suppressions
  /campaigns/{id}/suppressions:
    get:
      operationId: listSuppressions
      tags: [suppressions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Suppression" }
    post:
      operationId: createSuppression
      tags: [suppressions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SuppressionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Suppression" }
  /campaigns/{id}/suppressions/{suppressionId}:
    delete:
      operationId: deleteSuppression
      tags: [suppressions]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: suppressionId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ───────── Seeds
  /campaigns/{id}/seeds:
    get:
      operationId: listSeeds
      tags: [seeds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SeedGroup" }
    post:
      operationId: createSeedGroup
      tags: [seeds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeedGroupInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeedGroup" }
  /campaigns/{id}/seeds/{seedId}:
    delete:
      operationId: deleteSeedGroup
      tags: [seeds]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: seedId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ───────── Preview / Export
  /campaigns/{id}/preview:
    get:
      operationId: getCampaignPreview
      tags: [exports]
