        channelId: { type: ["integer", "null"] }
        campaignTypeId: { type: ["integer", "null"] }
        touchId: { type: ["integer", "null"] }
        reasonCodeId: { type: ["integer", "null"] }
        reasonCodeName: { type: ["string", "null"] }
        reason: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        donorIdCount: { type: integer }
        createdAt: { type: string, format: date-time }
    SuppressionInput:
