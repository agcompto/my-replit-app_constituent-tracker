              schema: { $ref: "#/components/schemas/SavedReportView" }
    delete:
      operationId: deleteSavedReportView
      tags: [savedViews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    SessionUser:
      type: object
      required: [id, email, name, role, active, piiAcknowledged, mustChangePassword, totpEnrolled, totpRequired]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [standard, admin, super_admin] }
        active: { type: boolean }
        piiAcknowledged: { type: boolean }
        mustChangePassword: { type: boolean }
        totpEnrolled:
          type: boolean
          description: True when the user has a confirmed TOTP secret on file.
        totpRequired:
          type: boolean
          description: True when the user's role mandates TOTP (admin/super_admin).

    LoginOutcome:
      oneOf:
        - $ref: "#/components/schemas/SessionUser"
        - $ref: "#/components/schemas/LoginTotpChallenge"
    LoginTotpChallenge:
      type: object
      required: [requiresTotp, enrollmentRequired]
      properties:
        requiresTotp:
          type: boolean
          description: Always true on this branch — instructs the client to render the second-factor step.
        enrollmentRequired:
          type: boolean
          description: True when the user has not yet enrolled a TOTP authenticator and must do so before completing login.

    TotpVerifyInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Either a 6-digit TOTP code or a 10-character recovery code.
    TotpEnrollStartResponse:
      type: object
      required: [otpauthUri, qrDataUrl, secret]
      properties:
        otpauthUri: { type: string }
        qrDataUrl:
          type: string
          description: data:image/png;base64,... encoded QR code for the otpauth URI.
        secret:
          type: string
          description: Base32-encoded shared secret. Shown beside the QR for manual entry; never persisted to the user row until enrollment is confirmed.
    TotpEnrollVerifyInput:
      type: object
      required: [code]
      properties:
        code: { type: string, description: 6-digit code from the authenticator app. }
    TotpRecoveryCodes:
      type: object
      required: [recoveryCodes]
      properties:
        recoveryCodes:
          type: array
          items: { type: string }
          description: Ten single-use recovery codes shown exactly once.
    TotpStatus:
      type: object
      required: [enrolled, required, unusedRecoveryCodes]
      properties:
        enrolled: { type: boolean }
        required: { type: boolean }
        enrolledAt: { type: ["string", "null"], format: date-time }
        unusedRecoveryCodes: { type: integer }

    ReauthInput:
      type: object
      required: [password]
      properties:
        password: { type: string, minLength: 1 }

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 8 }

    User:
      type: object
      required: [id, email, name, role, active, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [standard, admin, super_admin] }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
    UserInput:
      type: object
      required: [email, name, role]
      properties:
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [standard, admin, super_admin] }
    UserUpdate:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [standard, admin, super_admin] }
        active: { type: boolean }
    PasswordResetInput:
      type: object
      properties: {}
    InviteResponse:
      type: object
      required: [setupUrl, expiresAt, emailed]
      properties:
        setupUrl:
          type: string
          description: One-time setup URL. Always returned so the admin has a fallback to deliver out-of-band if email is unavailable.
        expiresAt: { type: string, format: date-time }
        emailed:
          type: boolean
          description: True when the link was successfully emailed directly to the user. False when email is not configured or the send failed; in that case the admin must hand-deliver the URL.
    UserCreatedResponse:
      type: object
      required: [user, setupUrl, expiresAt, emailed]
      properties:
        user: { $ref: "#/components/schemas/User" }
        setupUrl: { type: string }
        expiresAt: { type: string, format: date-time }
        emailed: { type: boolean }
    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    ForgotPasswordAck:
      type: object
      required: [message]
      properties:
        message: { type: string }
    PasswordResetResponse:
      $ref: "#/components/schemas/InviteResponse"
    PasswordSetupTokenInfo:
      type: object
      required: [email, name, kind, expiresAt]
      properties:
        email: { type: string }
        name: { type: string }
        kind: { type: string, enum: [invite, reset] }
        expiresAt: { type: string, format: date-time }
    CompletePasswordSetupInput:
      type: object
      required: [newPassword]
      properties:
        newPassword: { type: string, minLength: 12 }

    CampaignType:
      type: object
      required: [id, name, active, systemDefault]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        active: { type: boolean }
        systemDefault: { type: boolean }
    CampaignTypeInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
    CampaignTypeUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        active: { type: boolean }

    Channel:
      type: object
      required: [id, name, active, systemDefault]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        active: { type: boolean }
        systemDefault: { type: boolean }
    ChannelInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
    ChannelUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        active: { type: boolean }

    OwningUnit:
      type: object
      required: [id, name, active, systemDefault]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        active: { type: boolean }
        systemDefault: { type: boolean }
    OwningUnitInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
    OwningUnitUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        active: { type: boolean }

    CampaignInput:
      type: object
      required: [name, campaignTypeIds]
      properties:
        name: { type: string }
        owningUnit: { type: string }
        intendedSendStartDate: { type: ["string", "null"], format: date }
        audienceDescription: { type: string }
        salesforceCampaignId: { type: string }
        internalNotes: { type: string }
        campaignTypeIds:
          type: array
          items: { type: integer }
    CampaignUpdate:
      type: object
      properties:
        name: { type: string }
        owningUnit: { type: string }
        intendedSendStartDate: { type: ["string", "null"], format: date }
        audienceDescription: { type: string }
        salesforceCampaignId: { type: string }
        internalNotes: { type: string }
        campaignTypeIds:
          type: array
          items: { type: integer }
    CloneCampaignInput:
      type: object
      required: [name]
      properties:
        name: { type: string, description: "New campaign name. Defaults on the client to '<original> (copy)'." }
        intendedSendStartDate:
          type: ["string", "null"]
          format: date
          description: "New intended send start date for the cloned campaign. If provided and the source had one, touch send dates are shifted by (new - old) days unless dateShiftDays is supplied."
        dateShiftDays:
          type: integer
          description: "Optional explicit day-offset to apply to every copied touch's send date. Overrides the implicit shift derived from intendedSendStartDate."
    CloneCampaignResponse:
      type: object
      required: [campaign, copiedTouches, copiedThresholds, copiedSuppressions, skippedSuppressions, copiedSeeds]
      properties:
        campaign: { $ref: "#/components/schemas/Campaign" }
        copiedTouches: { type: integer }
        copiedThresholds: { type: integer }
        copiedSuppressions: { type: integer }
        skippedSuppressions:
          type: integer
          description: "Suppressions skipped because they referenced specific donor IDs from the source audience or were tied to a single source touch (touch-scoped)."
        copiedSeeds: { type: integer }
    CampaignSummary:
      type: object
      required: [id, name, status, submittedByName, owningUnit, createdAt, touchCount, audienceSize, campaignTypes, validIdCount, rejectedIdCount, duplicateIdCount, extraColumnsIgnored, suppressionCount, seedCount]
      properties:
        id: { type: integer }
        name: { type: string }
        status: { type: string }
        submittedByName: { type: string }
        submittedByUserId: { type: integer }
        owningUnit: { type: ["string", "null"] }
        intendedSendStartDate: { type: ["string", "null"], format: date }
        createdAt: { type: string, format: date-time }
        exportedAt: { type: ["string", "null"], format: date-time }
        touchCount: { type: integer }
        audienceSize: { type: integer }
        validIdCount: { type: integer }
        rejectedIdCount: { type: integer }
        duplicateIdCount: { type: integer }
        extraColumnsIgnored: { type: boolean }
        suppressionCount: { type: integer }
        seedCount: { type: integer }
        lastHealthCheckStatus:
          type: ["string", "null"]
          enum: [pass, warning, error, null]
        campaignTypes:
          type: array
          items: { type: string }
    Campaign:
      type: object
      required: [id, name, status, submittedByUserId, submittedByName, createdAt, campaignTypes]
      properties:
        id: { type: integer }
        name: { type: string }
        status: { type: string }
        owningUnit: { type: ["string", "null"] }
        submittedByUserId: { type: integer }
        submittedByName: { type: string }
        intendedSendStartDate: { type: ["string", "null"], format: date }
        audienceDescription: { type: ["string", "null"] }
        salesforceCampaignId: { type: ["string", "null"] }
        internalNotes: { type: ["string", "null"] }
        originalRowCount: { type: integer }
        blankRowCount: { type: integer }
        validIdCount: { type: integer }
        uniqueIdCount: { type: integer }
        duplicateIdCount: { type: integer }
        rejectedIdCount: { type: integer }
        extraColumnsIgnored: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        exportedAt: { type: ["string", "null"], format: date-time }
        archivedAt: { type: ["string", "null"], format: date-time }
        voidedAt: { type: ["string", "null"], format: date-time }
        campaignTypes:
          type: array
          items: { $ref: "#/components/schemas/CampaignType" }

    AudienceInput:
      type: object
      properties:
        # Provide exactly one of: rawText, googleSheetUrl, csvFileBase64
        rawText: { type: string }
        googleSheetUrl: { type: string }
        csvFileBase64: { type: string, description: "Base64-encoded CSV/TSV/text file contents" }
        csvFileName: { type: string }
        hasHeader: { type: boolean }
        columnIndex: { type: integer }
    AudienceUploadResult:
      type: object
      required: [originalRowCount, blankRowCount, validCount, uniqueCount, duplicateCount, rejectedCount, extraColumnsIgnored, rejectedSamples, duplicateSamples]
